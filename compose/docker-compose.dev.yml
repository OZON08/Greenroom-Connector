# Local Greenlight v3 + Keycloak stack for testing the Outlook add-in.
#
# SECURITY: this stack contains hardcoded dev credentials (Postgres, Keycloak
# admin, OIDC client secret, Rails SECRET_KEY_BASE) and test users with known
# passwords (test123 / alice123). It is NOT safe to expose externally. Ports
# are bound to 127.0.0.1 below so the stack stays loopback-only — do not
# remove the bind address unless you fully understand what you are exposing.
#
# Quick start (PowerShell, from repo root):
#   1. docker compose -f compose/docker-compose.dev.yml up -d
#   2. .\scripts\Set-DevRegistry.ps1 -GreenlightUrl http://localhost:3000
#   3. F5 in Visual Studio. Login with test@example.com / test123.
#
# Wipe everything:  docker compose -f compose/docker-compose.dev.yml down -v
#
# How the OIDC dual-host setup works:
#   - Keycloak runs with KC_HOSTNAME=localhost, so the issuer in signed
#     tokens is http://localhost:8080/realms/greenlight. The browser
#     resolves localhost natively, no hosts-file edit needed.
#   - Greenlight (in the container) reaches Keycloak via the Docker DNS
#     name 'keycloak'. A mounted OmniAuth override (greenlight/omniauth.rb)
#     splits the OIDC config so authorization_endpoint uses 'localhost'
#     while token/userinfo/jwks calls go to 'keycloak' over the bridge.
#   - The 'iss' claim in tokens equals the configured issuer, so OIDC
#     validation passes.
#
# This stack does NOT include a real BBB server. The room list will work,
# but actually starting a meeting will fail. That is fine for testing the
# add-in (which only inserts join links).

services:
  postgres:
    image: postgres:14-alpine
    container_name: gl-postgres
    environment:
      POSTGRES_DB: greenlight_v3_production
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: dev-postgres-password
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d greenlight_v3_production"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [glnet]

  redis:
    image: redis:7-alpine
    container_name: gl-redis
    volumes:
      - redis-data:/data
    networks: [glnet]

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: gl-keycloak
    command: ["start-dev", "--import-realm"]
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      # Public URL that the browser sees AND that Keycloak signs into the
      # 'iss' claim of its tokens. Greenlight's OmniAuth override below
      # validates against this same value, while doing its backchannel
      # calls over the Docker network via the alias 'keycloak'.
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: "8080"
      KC_HOSTNAME_STRICT_BACKCHANNEL: "true"
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
    ports:
      # Loopback-only: see SECURITY note at the top of this file.
      - "127.0.0.1:8080:8080"
    volumes:
      - ./keycloak:/opt/keycloak/data/import:ro
    networks:
      glnet:
        aliases: [keycloak]

  greenlight:
    image: bigbluebutton/greenlight:v3
    container_name: gl-app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      keycloak:
        condition: service_started
    environment:
      DATABASE_URL: postgres://postgres:dev-postgres-password@postgres:5432/greenlight_v3_production
      REDIS_URL: redis://redis:6379
      # Dev-only fixed key (NOT for production). Generate a real one with
      # `bin/rails secret` before exposing this stack to anything real.
      SECRET_KEY_BASE: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      RELATIVE_URL_ROOT: /
      # No real BBB. Joining a meeting will fail; listing rooms works.
      BIGBLUEBUTTON_ENDPOINT: https://test.bigbluebutton.org/bigbluebutton/
      BIGBLUEBUTTON_SECRET: 8cd8ef52e8e101574e400365b55e11a6
      OPENID_CONNECT_CLIENT_ID: greenlight
      OPENID_CONNECT_CLIENT_SECRET: greenlight-dev-secret
      # Browser-facing URL (matches the 'iss' claim Keycloak signs).
      OPENID_CONNECT_ISSUER: http://localhost:8080/realms/greenlight
      # Docker-internal URL for token/userinfo/jwks calls. Read by the
      # mounted omniauth.rb override (custom env var, not stock Greenlight).
      OPENID_CONNECT_BACKEND_BASE: http://keycloak:8080/realms/greenlight
      OPENID_CONNECT_REDIRECT: http://localhost:3000
      OMNIAUTH_BUTTON_TEXT: Sign in with Keycloak (dev)
      DEFAULT_LOCALE: de
      RAILS_LOG_TO_STDOUT: "true"
    ports:
      # Loopback-only: see SECURITY note at the top of this file.
      - "127.0.0.1:3000:3000"
    volumes:
      # Dev override: Greenlight v3 hardcodes config.force_ssl = true, which
      # breaks plain HTTP access. This initializer flips it back off.
      - ./greenlight/zz_disable_force_ssl.rb:/usr/src/app/config/initializers/zz_disable_force_ssl.rb:ro
      # Dev override: replace the stock OmniAuth initializer with one that
      # accepts separate browser-facing and backend-facing OIDC URLs, so we
      # don't need a hosts-file edit on the dev machine.
      - ./greenlight/omniauth.rb:/usr/src/app/config/initializers/omniauth.rb:ro
      # Dev override: drop the Secure flag on the session cookie so the
      # browser stores it over plain HTTP. Without this the session cookie
      # is dropped, no CSRF token is associated with the user, and the
      # OmniAuth form submit fails with InvalidAuthenticityToken.
      - ./greenlight/session_store.rb:/usr/src/app/config/initializers/session_store.rb:ro
    networks: [glnet]

volumes:
  postgres-data:
  redis-data:

networks:
  glnet:
    driver: bridge
